services:

  # ── MySQL intégré — activer avec : docker compose --profile mysql up ─────────
  mysql:
    profiles: ["mysql"]
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: erp_perso
      MYSQL_USER: erp
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Application (frontend + backend) ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5173:4000"
    environment:
      NODE_ENV: production
      COOKIE_SECURE: "false"
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:
